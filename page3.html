<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💼 勇者入職試煉</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="nav.css">
    <script src="game-engine.js"></script>
    
    <style>
        /* 🌟 導覽列防擠壓修正 */
        .nav-tabs { 
            display: flex; 
            justify-content: space-around; 
            width: 100%; 
            box-sizing: border-box; 
        }
        .tab-btn { 
            flex: 0 0 auto !important; 
            white-space: nowrap !important; 
        }

        .details-body { 
            white-space: normal !important; 
            color: #b0b0b0; 
        }
        
        .task-target { 
            color: #cccccc; 
            font-weight: bold; 
            display: block; 
            margin-bottom: 12px; 
        }
        
        .check-item { 
            display: flex; 
            align-items: center; 
            margin-bottom: 10px; 
            cursor: pointer; 
            font-size: 14px; 
            color: #a0a0a0; 
        }
        
        .check-item input[type="checkbox"] { 
            margin-right: 8px; 
            width: 16px; 
            height: 16px; 
            flex-shrink: 0; 
        }
        
        .tracking-box { 
            background: rgba(0,0,0,0.2); 
            padding: 20px; 
            border-radius: 8px; 
            border: 1px dashed #555; 
            margin: 20px 0; 
        }
        
        .date-row { 
            display: flex; 
            flex-wrap: wrap; 
            align-items: center; 
            gap: 8px; 
            margin-bottom: 15px; 
        }
        
        .date-row label { 
            flex: 0 0 100%; 
            font-size: 14px; 
            margin-bottom: 4px; 
        }
        
        .btn-lock { 
            background: #232a35; 
            color: #4ade80; 
            border: 1px solid #4ade80; 
            padding: 6px 12px; 
            border-radius: 4px; 
            cursor: pointer; 
        }
        
        .btn-lock:disabled { 
            opacity: 0.3; 
        }
        
        .upload-group { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin-bottom: 12px; 
        }
        
        .file-upload-btn { 
            background: #232a35; 
            color: #8ab4f8; 
            border: 1px solid #8ab4f8; 
            padding: 4px 10px; 
            border-radius: 4px; 
            font-size: 13px; 
            cursor: pointer; 
        }
        
        .upload-status { 
            font-size: 12px; 
            color: #888; 
            margin-left: 5px; 
        }
        
        .upload-status.success { 
            color: #4ade80; 
        }
    </style>
</head>

<body class="page-3">

    <div class="sticky-bar" id="block-identity">
        <span class="dyn-company">...</span> | 
        <span class="dyn-team">...</span> | 
        <span class="dyn-type">...</span> | 
        <span class="dyn-name">...</span>
    </div>

    <div class="sticky-bar" id="block-status-1" style="top: 45px;">
        <span id="rank-text">載入中...</span>
    </div>

    <div class="sticky-bar" id="block-status-2" style="top: 90px;">
        <span id="status-tag">載入中...</span>
    </div>

    <div class="sticky-bar" id="block-status-3" style="top: 135px;">
        🏆 <span id="score-text">0分</span> 
        <div class="progress-track">
            <div class="progress-fill" id="score-fill"></div>
        </div>
        ⚔️ <span id="prog-val">0%</span> 
        <div class="progress-track">
            <div class="progress-fill" id="prog-fill"></div>
        </div>
    </div>

    <nav class="nav-tabs" style="top: 180px;">
        <a href="index.html" class="tab-btn">📜 冒險指南</a>
        <a href="page2.html" class="tab-btn">🏹 鍛造秘笈</a>
        <a href="javascript:void(0)" onclick="location.reload()" class="tab-btn active">⚔️ 勇者試煉</a>
    </nav>

    <main class="tab-content active" style="margin-top:250px;">

        <details id="detail-trial-1">
            <summary class="main-summary" onclick="GameEngine.unlock(event, 'fold_onboard', 'big', '入職報到說明', 2)">【新手報到】啟程點</summary>
            <div class="details-body">
                <label class="check-item">
                    <input type="checkbox" id="chk-guide"> 我已閱讀「📜 冒險指南」
                </label>
                <label class="check-item">
                    <input type="checkbox" id="chk-forge"> 我已閱讀「🏹 鍛造秘笈」
                </label>
                <label class="check-item">
                    <input type="checkbox" id="chk-risk"> 若被退件「👤 本人承擔」
                </label>
                
                <button class="btn-confirm" id="btn-trial-1" onclick="checkT1(event)">🚀 提交任務</button>
            </div>
        </details>

        <details id="detail-trial-2">
            <summary class="main-summary">【裝備盤點】行囊區</summary>
            <div class="details-body">
                <label class="check-item">
                    <input type="checkbox" id="chk-t2-1"> 台新銀行實體存摺
                </label>
                <label class="check-item">
                    <input type="checkbox" id="chk-t2-2"> 中餐證照
                </label>
                <label class="check-item">
                    <input type="checkbox" id="chk-t2-3"> 西餐證照
                </label>
                <label class="check-item">
                    <input type="checkbox" id="chk-t2-4"> 其他：
                    <input type="text" id="input-other" class="text-input-field">
                </label>
                
                <button class="btn-confirm" id="btn-trial-2" onclick="GameEngine.completeTrial(event, 2)">🚀 提交任務</button>
            </div>
        </details>

        <details id="detail-trial-3">
            <summary class="main-summary">【裝備強化】鑑定所</summary>
            <div class="details-body">
                
                <div class="upload-group">
                    <label class="check-item">
                        <input type="checkbox" id="chk-e1" onclick="return false"> 一般勞工體檢表
                    </label>
                    <div>
                        <input type="file" id="f1" style="display:none" onchange="GameEngine.handleFileUpload(this,'chk-e1')">
                        <button class="file-upload-btn" onclick="document.getElementById('f1').click()">上傳</button>
                        <span class="upload-status"></span>
                    </div>
                </div>
                
                <div class="upload-group">
                    <label class="check-item">
                        <input type="checkbox" id="chk-e2" onclick="return false"> 食品體檢表
                    </label>
                    <div>
                        <input type="file" id="f2" style="display:none" onchange="GameEngine.handleFileUpload(this,'chk-e2')">
                        <button class="file-upload-btn" onclick="document.getElementById('f2').click()">上傳</button>
                        <span class="upload-status"></span>
                    </div>
                </div>
                
                <label class="check-item">
                    <input type="checkbox" id="chk-photo"> 兩吋照片一張
                </label>
                
                <div class="upload-group">
                    <label class="check-item">
                        <input type="checkbox" id="chk-e3" onclick="return false"> 健保轉出證明
                    </label>
                    <div>
                        <input type="file" id="f3" style="display:none" onchange="GameEngine.handleFileUpload(this,'chk-e3')">
                        <button class="file-upload-btn" onclick="document.getElementById('f3').click()">上傳</button>
                        <span class="upload-status"></span>
                    </div>
                </div>
                
                <div class="tracking-box">
                    <div class="date-row">
                        <label>預計體檢日期：</label>
                        <input type="date" id="input-exam-date">
                        <button class="btn-lock" id="btn-lock-exam" onclick="GameEngine.lockDate('exam')">確認</button>
                    </div>
                    <div class="date-row">
                        <label>報告預計產出：</label>
                        <input type="date" id="input-result-date">
                        <button class="btn-lock" id="btn-lock-result" onclick="GameEngine.lockDate('result')">確認</button>
                    </div>
                    <div class="date-row">
                        <label>申請更改日期與原因：</label>
                        <input type="date" id="input-change-date">
                        <input type="text" id="input-change-reason" class="text-input-field" placeholder="請輸入原因" style="flex:1">
                        <button class="btn-lock" id="btn-lock-change" onclick="GameEngine.requestChange()">送出</button>
                    </div>
                    <div style="font-size:12px;color:#ff8a8a;margin-top:10px;">⚠️ 請確認資料全數備妥後,再按送出。</div>
                </div>
                
                <button class="btn-confirm" id="btn-trial-3" onclick="checkT3(event)">🚀 提交任務</button>
            </div>
        </details>

        <details id="detail-trial-4">
            <summary class="main-summary">【戰役集結】前線營</summary>
            <div class="details-body">
                <div style="background:rgba(251,191,36,0.1);padding:15px;border-radius:8px;border:1px solid #fbbf24;margin-bottom:15px;">
                    ⏰ 報到時間：<span id="dyn-apt-time" style="color:#fbbf24">...</span><br>
                    📍 報到地點：<span id="dyn-apt-loc" style="color:#fbbf24">...</span>
                </div>
                <label class="check-item">
                    <input type="checkbox" id="chk-t4-1"> 確認服裝儀容規範
                </label>
                <label class="check-item">
                    <input type="checkbox" id="chk-t4-2"> 五大正本文件夾已備妥
                </label>
                
                <button class="btn-confirm" id="btn-trial-4" onclick="checkT4(event)">🚀 提交任務</button>
            </div>
        </details>

        <details id="detail-trial-5">
            <summary class="main-summary">【最終戰役】誓約日</summary>
            <div class="details-body">
                <a href="https://mys0819.github.io/LCS1/" target="_blank" class="external-link">🔗 開啟勞工名卡填寫表單</a><br><br>
                
                <label class="check-item">
                    <input type="checkbox" id="chk-t5-1" onclick="GameEngine.toggleTrial5Score(event,'t5_score_1')"> 勞工名卡已完成
                </label>
                <label class="check-item">
                    <input type="checkbox" id="chk-t5-2" onclick="GameEngine.toggleTrial5Score(event,'t5_score_2')"> 勞動契約已查看
                </label>
                
                <button class="btn-confirm" id="btn-trial-5" onclick="checkT5(event)">🚀 提交任務</button>
            </div>
        </details>

        <details id="detail-trial-6">
            <summary class="main-summary">【榮耀加冕】聖殿區</summary>
            <div class="details-body">
                <label class="check-item">
                    <input type="checkbox" id="chk-bank-have" onclick="checkBankLogic(this,'have')"> 已有台新帳戶
                </label>
                <label class="check-item">
                    <input type="checkbox" id="chk-bank-process" onclick="checkBankLogic(this,'process')"> 申辦中
                </label>
                
                <div class="tracking-box">
                    <div class="date-row">
                        <label>預計辦理：</label>
                        <input type="date" id="input-bank-date">
                        <button class="btn-lock" id="btn-lock-bank" onclick="GameEngine.lockDate('bank')">確認</button>
                    </div>
                </div>
                
                <button class="btn-confirm" id="btn-trial-6" onclick="checkT6(event)">👑 迎接榮耀</button>
            </div>
        </details>

    </main>

    <footer class="footer">
        <img src="assets/MYs_logo_去背.png" alt="MYs Logo" class="footer-logo">
        © Copyright 2026 MYs System
    </footer>

    <script>
        function applyData(d) {
            document.querySelectorAll('.dyn-company').forEach(e => e.innerText = d.companyName);
            document.querySelectorAll('.dyn-team').forEach(e => e.innerText = d.team);
            document.querySelectorAll('.dyn-type').forEach(e => e.innerText = d.type);
            document.querySelectorAll('.dyn-name').forEach(e => e.innerText = d.userName);
        }

        function checkT1(e) {
            if (document.getElementById('chk-guide').checked && document.getElementById('chk-forge').checked && document.getElementById('chk-risk').checked) {
                GameEngine.completeTrial(e, 1);
            } else {
                alert("請勾選確認項目！");
            }
        }

        function checkT3(e) {
            if (document.getElementById('chk-e1').checked && document.getElementById('chk-e2').checked && document.getElementById('chk-photo').checked) {
                GameEngine.completeTrial(e, 3);
            } else {
                alert("⚠️ 必須上傳體檢報告並確認照片已備妥才能推進關卡！");
            }
        }

        function checkT4(e) {
            if (document.getElementById('chk-t4-1').checked && document.getElementById('chk-t4-2').checked) {
                GameEngine.completeTrial(e, 4);
            } else {
                alert("請確認各項準備！");
            }
        }

        function checkT5(e) {
            if (document.getElementById('chk-t5-1').checked && document.getElementById('chk-t5-2').checked) {
                GameEngine.completeTrial(e, 5);
            } else {
                alert("請完成名卡與契約！");
            }
        }

        function checkBankLogic(el, s) {
            if (el.checked) {
                GameEngine.state.bankStatus = s;
            } else {
                GameEngine.state.bankStatus = null;
            }
            GameEngine.save();
            GameEngine.updateButtonStyles();
        }

        function checkT6(e) {
            if (GameEngine.state.bankStatus) {
                GameEngine.completeTrial(e, 6);
            } else {
                alert("請勾選銀行狀態！");
            }
        }
    </script>
</body>
</html>
